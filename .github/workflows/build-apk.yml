name: Build TWA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Create TWA Android Project
        run: |
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/app/src/main/java/com/todopro/app

          cat > twa-app/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TodoPro"
          include ':app'
          EOF

          cat > twa-app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat > twa-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.todopro.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.todopro.app'
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  debug { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.TodoPro"
                  android:supportsRtl="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://todo-list43.netlify.app" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="todo-list43.netlify.app"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:enabled="@bool/enableNotification"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          cat > twa-app/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Todo Pro</string>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/bools.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <bool name="enableNotification">true</bool>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.TodoPro" parent="android:Theme.NoTitleBar">
                  <item name="android:windowBackground">#050505</item>
              </style>
          </resources>
          EOF

      - name: Setup Gradle Wrapper
        run: |
          cd twa-app
          gradle wrapper --gradle-version=8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd twa-app
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoPro-APK
          path: twa-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
