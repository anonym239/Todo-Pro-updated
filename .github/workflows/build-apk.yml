name: Build TWA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Initialize TWA Project
        run: |
          mkdir -p twa-project
          cd twa-project
          bubblewrap init \
            --manifest https://todo-list43.netlify.app/manifest.json \
            --directory . \
            --skip-pwa-validation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'

      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoPro-APK
          path: |
            twa-project/app/build/outputs/apk/release/*.apk
            twa-project/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
